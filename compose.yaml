services:
  db:
    image: postgres:16
    container_name: arpg-db
    environment:
      - POSTGRES_USER=alguem
      - POSTGRES_PASSWORD=123456789
      - POSTGRES_DB=arpg_db
    volumes:
      - arpg-db:/var/lib/postgresql
    ports:
      - "5432:5432"

  arpg.api:
    image: arpg.api
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arpg-backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=arpg_db;Username=alguem;Password=123456789
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  arpg-db: